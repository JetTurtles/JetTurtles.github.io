<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JetTurtles</title>
    <!--公共样式-->
    <link href="css/common.css" type="text/css" rel="stylesheet">
    <!--jQuery-->
    <script src="js/jquery.min.js"></script>
</head>
<body>
<div id="top"></div>
<script type="text/javascript">
    $("#top").load("html/top.html")
</script>
<div id="blogs">
</div>
<script>
    $(document).ready(function () {
        $.getJSON("blog/blogs.json", blogs => {
            if (blogs) {
                for (let blog of blogs) {
                    const div = $(`<div class='blog-item' onclick="window.open('blog/${blog.path}')" style="background-image: url(${blog.img})"></div>`);
                    const content = $(`<div class="blog-item-content"></div>`);
                    content.append($(`<div>${blog.title}</div>`))
                    div.append(content)
                    $("#blogs").append(div)
                }
            }
        })
    });
</script>
</body>
</html>
<style>
    #blogs {
        width: 90%;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
    }

    .blog-item {
        background-size: cover;
        width: 31%;
        max-width: 400px;
        height: 240px;
        box-sizing: border-box;
        margin: 10px 10px;
        box-shadow: 0 0 10px white;

        display: flex;
        flex-direction: column;
    }

    .blog-item-content {
        width: 100%;
        height: 60px;
        margin-top: auto;
        background-color: rgb(160, 160, 160);
    }
</style>
