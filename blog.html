<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JetTurtles</title>
    <!--公共样式-->
    <link href="css/common.css" type="text/css" rel="stylesheet">
    <link href="css/bulma.min.css" type="text/css" rel="stylesheet">
    <!--jQuery-->
    <script src="js/jquery.min.js"></script>
</head>
<body>
<div id="top"></div>
<section class="section">
    <div class="container is-fullwidth" id="blogs">
    </div>
</section>
<script type="text/javascript">
    $("#top").load("html/top.html")
</script>
<script>
    $(document).ready(function () {
        $.getJSON("blog/blogs.json", blogs => {
            if (blogs) {
                for (let blog of blogs) {
                    const div = $(`
<div class="card m-1">
<a href="${blog.path}">
   <div class="card-content">
    <div class="media">
      <div class="media-left">
        <figure class="image is-128x128">
          <img src="${blog.img}" alt="Placeholder image"/>
        </figure>
      </div>
      <div class="media-content">
        <p class="title is-4">${blog.title}</p>
      <time >${blog.date}</time>
      </div>
    </div>
  </div>
</a>
</div>`);
                    $("#blogs").append(div)
                }
            }
        })
    });
</script>
</body>
</html>
<style>
    #blogs {
        width: 90%;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
    }

    .blog-item {
        background-size: cover;
        width: 31%;
        max-width: 400px;
        height: 240px;
        box-sizing: border-box;
        margin: 10px 10px;
        border-radius: 5px;
        box-shadow: 0 0 2px white;

        display: flex;
        flex-direction: column;
    }

    .blog-item:hover {
        box-shadow: 0 0 10px white;
    }

    .blog-item-content {
        width: 100%;
        height: 60px;
        margin-top: auto;
        border-bottom-left-radius: 5px;
        border-bottom-right-radius: 5px;
        background-color: rgb(160, 160, 160);
    }
</style>
