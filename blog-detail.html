<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>$Title$</title>
    <!-- 引入marked.js库 -->
    <script src="js/marked.min.js"></script>
    <!--jQuery-->
    <script src="js/jquery.min.js"></script>
    <!--公共样式-->
    <link href="css/bulma.min.css" type="text/css" rel="stylesheet">
</head>
<body>
<div id="top"></div>
<!-- 添加一个容器来展示Markdown内容 -->
<section class="section">
    <div class="content" id="blog-detail">

    </div>
    <!-- 添加一个容器来展示大纲 -->
    <div class="content" id="table-of-contents"
         style="position: fixed; top: 10px; right: 10px; width: 200px; background: white; padding: 10px; border: 1px solid #ddd;">
        <ul id="toc-list">
        </ul>
    </div>
</section>

<script type="text/javascript">
    $("#top").load("top.html")
    // 获取Markdown文件名称
    const name = getQueryParam();
    //  名称不为空的话，加载Markdown文件
    if (name) {
        const path = name.endsWith('.md') ? name : name + '.md';
        loadMarkdownFile(`blog/${path}`);
    }

    // 获取URL参数的函数
    function getQueryParam() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('name');
    }

    // 加载并解析Markdown文件的函数
    function loadMarkdownFile(path) {
        fetch(path)
            .then(response => response.text())
            .then(text => {
                const lines = text.split('\n');
                // 获取标题并设置页面标题
                const firstLine = lines[0].trim();
                if (firstLine.startsWith('# ')) {
                    document.title = firstLine.substring(2); // 去掉 '# ' 前缀
                }
                let html = marked.parse(text);
                // 生成大纲
                html = generateTableOfContents(html);
                document.getElementById('blog-detail').innerHTML = html;
            })
            .catch(error => console.error('Error loading Markdown file:', error));
    }

    // 生成大纲的函数
    function generateTableOfContents(html) {
        // 解析HTML字符串为DOM对象
        let dom = new DOMParser();
        let doc = dom.parseFromString(html, 'text/html');
        // 获取所有h2到h6标签
        let headings = doc.querySelectorAll('h2,h3,h4,h5,h6')
        // 遍历每个标题标签，生成大纲
        let tocList = document.getElementById('toc-list');
        for (let i = 0; i < headings.length; i++) {
            let heading = headings[i];
            // 为每个标题添加一个唯一的ID
            heading.id = Math.random().toString(36)
            let level = heading.tagName.charAt(1);
            let text = heading.textContent;
            // 创建一个链接
            let link = document.createElement('a');
            link.style.color = 'black';
            link.href = '#' + heading.id;
            link.textContent = text;
            let listItem = document.createElement('li');
            listItem.style.marginLeft = (level - 2) * 10 + 'px';
            listItem.appendChild(link);
            tocList.appendChild(listItem);
        }
        return doc.body.innerHTML;
    }
</script>
</body>
</html>
